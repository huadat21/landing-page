<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuestArena Trivia Giveaway</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2b1055, #5b1b75);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
            width: 90%;
            background: rgba(255, 255, 255, 0.05);
            padding: 25px 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-tag {
            background-color: #ffcc00;
            color: #1a0533;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(255, 204, 0, 0.4);
        }
        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            color: #ffffff;
        }
        .sub-title {
            color: #e0b0ff;
            font-size: 15px;
            margin-bottom: 25px;
        }
        .quiz-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .question {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: linear-gradient(90deg, #ff9900, #ffcc00);
            color: #1a0533;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s ease;
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.3);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .loading {
            display: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #ffcc00;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-tag">ENTER TO WIN!</div>
    <h1>AIRTIME GIVEAWAY</h1>
    <p class="sub-title">Have fun answering 2 simple trivia questions to unlock your rewards!</p>

    <div class="quiz-box" id="quiz-container">
        <div id="question-text" class="question">Question 1: Do you love playing mobile games?</div>
        <div id="answers-block">
            <button class="btn" onclick="nextQuestion()">YES, I DO</button>
            <button class="btn" onclick="nextQuestion()">SOMETIMES</button>
        </div>
    </div>

    <div class="quiz-box loading" id="loading-container">
        <div class="spinner"></div>
        <div class="question" style="font-size: 16px;">Verifying your answers...</div>
    </div>
</div>

<script>
    // Link chiến dịch cá nhân của bạn đã được tích hợp thành công
    const goldenGooseLink = "https://fkrfhb.one/cl/28fd706dc0de3eb9"; 
    
    let currentStep = 1;

    function nextQuestion() {
        if (currentStep === 1) {
            currentStep = 2;
            document.getElementById("question-text").innerText = "Question 2: Are you a Safaricom user inside Kenya?";
            document.getElementById("answers-block").innerHTML = `
                <button class="btn" onclick="verifyResults()">YES, CONTINUING</button>
                <button class="btn" onclick="verifyResults()">NOT SURE</button>
            `;
        }
    }

    function verifyResults() {
        document.getElementById("quiz-container").style.display = "none";
        document.getElementById("loading-container").style.display = "flex";
        
        setTimeout(() => {
            document.getElementById("loading-container").innerHTML = `
                <div class="question" style="color: #ffcc00; font-size: 20px;">✓ CONGRATULATIONS!</div>
                <p style="font-size: 14px; margin: 0;">You qualify for the QuestArena Trivia Rewards!</p>
                <p style="font-size: 12px; color: #e0b0ff;">Redirecting to the final claim page...</p>
            `;
            
            setTimeout(() => {
                window.location.href = goldenGooseLink;
            }, 1000);

        }, 1500);
    }
</script>

</body>
</html>
